# ═══════════════════════════════════════════════════════════════════════════
# HOST PRO — CI/CD → Azure App Service
# Compatible Azure for Students (Publish Profile auth)
#
# Déclencheurs :
#   push main   → build + déploiement production
#   PR vers main → lint + build uniquement
#
# Secrets GitHub requis :
#   AZURE_WEBAPP_PUBLISH_PROFILE  → Profil de publication App Service
#   AZURE_WEBAPP_NAME             → hostpro-dev-app
#   DATABASE_URL                  → postgresql://...
#   JWT_SECRET / JWT_REFRESH_SECRET
#   ANTHROPIC_API_KEY
#   RESEND_API_KEY
#   STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_STARTER / PRO / ENTERPRISE
#   VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY / VAPID_EMAIL
# ═══════════════════════════════════════════════════════════════════════════

name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

jobs:
  # ── 1. Lint & Build ──────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: hostpro-web/package-lock.json

      - name: Install dependencies
        working-directory: hostpro-web
        run: npm ci

      - name: Patch schema for PostgreSQL + generate Prisma client
        working-directory: hostpro-web
        run: |
          sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
          npx prisma generate
          # Push schema to database (creates tables if missing, safe to re-run)
          npx prisma db push --skip-generate --accept-data-loss=false
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Type check (non-bloquant)
        working-directory: hostpro-web
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js (standalone)
        working-directory: hostpro-web
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "HostPro <noreply@hostpro.fr>"
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          NEXT_PUBLIC_APP_URL: "https://hostpro-dev-app.azurewebsites.net"
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: production

      - name: Préparer le package de déploiement
        working-directory: hostpro-web
        run: |
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public

          # Oryx exclut les répertoires cachés (.prisma) lors de la compression node_modules.
          # On copie l'engine Prisma Linux dans un dossier NON-caché.
          # PRISMA_QUERY_ENGINE_LIBRARY est configuré dans les app settings Azure.
          mkdir -p .next/standalone/prisma-engines
          # Chercher le bon binaire selon la plateforme CI (debian ou musl)
          for bin in \
            node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node \
            node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node \
            node_modules/.prisma/client/libquery_engine-linux-musl.so.node; do
            [ -f "$bin" ] && cp "$bin" .next/standalone/prisma-engines/ && echo "Copied: $bin"
          done

          cd .next/standalone
          zip -r ../../deploy.zip . -x "*.map"

      - name: Uploader l'artifact de déploiement
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: hostpro-web/deploy.zip
          retention-days: 1

  # ── 2. Deploy → Azure App Service ────────────────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://hostpro-dev-app.azurewebsites.net

    steps:
      - name: Télécharger le package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      # ZipDeploy via curl — credentials passés par env vars pour éviter l'expansion bash du $ dans le username Kudu
      - name: Déployer sur Azure App Service
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
          WEBAPP: ${{ env.WEBAPP_NAME }}
        run: |
          echo "Deploying to https://${WEBAPP}.scm.azurewebsites.net..."
          HTTP=$(curl -s -o /tmp/deploy_out.txt -w "%{http_code}" \
            -X POST \
            "https://${WEBAPP}.scm.azurewebsites.net/api/zipdeploy" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --max-time 600)
          cat /tmp/deploy_out.txt || true
          echo "HTTP status: $HTTP"
          [ "$HTTP" = "200" ] || [ "$HTTP" = "204" ] && echo "✅ Deploy OK" || (echo "❌ Deploy failed: $HTTP" && exit 1)

      - name: Health check post-déploiement
        run: |
          echo "Attente démarrage (30s)..."
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.WEBAPP_NAME }}.azurewebsites.net/api/health)
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ App healthy" && exit 0
            sleep 15
          done
          echo "❌ Health check failed" && exit 1

      - name: Résumé du déploiement
        if: success()
        run: |
          echo "## ✅ Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL Production | https://hostpro-dev-app.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
