# ═══════════════════════════════════════════════════════════════════════════
# HOST PRO — CI/CD → Azure App Service (Publish Profile)
# Compatible Azure for Students (pas de Service Principal requis)
#
# Déclencheurs :
#   push main   → build + déploiement production
#   PR vers main → lint + build uniquement
#
# Secrets GitHub requis :
#   AZURE_WEBAPP_PUBLISH_PROFILE  → Profil de publication App Service
#   AZURE_WEBAPP_NAME             → hostpro-dev-app
#   DATABASE_URL                  → postgresql://...
#   JWT_SECRET                    → secret JWT
#   JWT_REFRESH_SECRET            → secret JWT refresh
#   ANTHROPIC_API_KEY
#   RESEND_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_STARTER / PRO / ENTERPRISE
#   VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY / VAPID_EMAIL
#   NEXT_PUBLIC_APP_URL
# ═══════════════════════════════════════════════════════════════════════════

name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

jobs:
  # ── 1. Lint & Build ──────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: hostpro-web/package-lock.json

      - name: Install dependencies
        working-directory: hostpro-web
        run: npm ci

      - name: Patch schema for PostgreSQL + generate Prisma client
        working-directory: hostpro-web
        run: |
          sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
          npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Type check (non-bloquant)
        working-directory: hostpro-web
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js (standalone)
        working-directory: hostpro-web
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "HostPro <noreply@hostpro.fr>"
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          NEXT_PUBLIC_APP_URL: "https://hostpro-dev-app.azurewebsites.net"
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: production

      - name: Préparer le package de déploiement
        working-directory: hostpro-web
        run: |
          # Copier les fichiers statiques dans standalone
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

          # Créer le ZIP de déploiement
          cd .next/standalone
          zip -r ../../deploy.zip . -x "*.map"

      - name: Uploader l'artifact de déploiement
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: hostpro-web/deploy.zip
          retention-days: 1

  # ── 2. Deploy → Azure App Service ────────────────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://hostpro-dev-app.azurewebsites.net

    steps:
      - name: Télécharger le package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Déployer sur Azure App Service (ZipDeploy)
        run: |
          USER=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -oP 'userPWD="\K[^"]+' | head -1)
          echo "Deploying to https://${{ env.WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy"
          curl -X POST "https://${{ env.WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            -f --retry 3 --max-time 300 \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Résumé du déploiement
        run: |
          echo "## ✅ Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL Production | https://hostpro-dev-app.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
